name = "gimme-worker"
main = "src/index.ts"
compatibility_date = "2024-06-20"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 */6 * * *", "0 9 * * *"]   # monitoring sweep (6h) + prospecting sweep (9am daily)

[[d1_databases]]
binding = "DB"
database_name = "gimme-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
migrations_dir = "src/db/migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[vars]
FRONTEND_URL = "https://gimme.domains"
CLAIM_WINDOW_DAYS = "30"
DEFAULT_RESCUE_PRICE_USD = "299"

# Secrets — set via: wrangler secret put SECRET_NAME
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# DYNADOT_API_KEY
# ESTIBOT_API_KEY
# ANTHROPIC_API_KEY

[[migrations]]
tag = "v1"
new_classes = []
